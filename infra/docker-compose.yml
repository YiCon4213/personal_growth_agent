services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: personal_growth_agent_postgres
    environment:
      POSTGRES_DB: personal_growth_agent
      POSTGRES_USER: personal_growth_agent
      POSTGRES_PASSWORD: personal_growth_agent_dev
    ports:
      - "5433:5432"
    volumes:
      - personal_growth_agent_postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init_pgvector.sql:/docker-entrypoint-initdb.d/001_init_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personal_growth_agent -d personal_growth_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  personal_growth_agent_postgres_data:

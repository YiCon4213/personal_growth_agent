x-backend-build: &backend-build
  context: ..
  dockerfile: backend/Dockerfile

x-backend-environment: &backend-environment
  ENVIRONMENT: production
  DATABASE_URL: postgresql+psycopg://personal_growth_agent:${POSTGRES_PASSWORD:-personal_growth_agent_dev}@postgres:5432/personal_growth_agent
  API_DOCS_ENABLED: "false"
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,frontend}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
  MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-12582912}
  RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
  RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-120}
  TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}
  MCP_STDIO_ALLOWED_COMMANDS: ${MCP_STDIO_ALLOWED_COMMANDS:-uvx}
  MCP_STDIO_ALLOWED_TARGETS: ${MCP_STDIO_ALLOWED_TARGETS:-mcp-server-time}
  MCP_STDIO_ALLOWED_ENV_KEYS: ${MCP_STDIO_ALLOWED_ENV_KEYS:-TZ}
  MCP_STDIO_ALLOW_ABSOLUTE_COMMANDS: "false"
  MCP_STDIO_ALLOW_WORKING_DIRECTORY: "false"
  MCP_REMOTE_ALLOWED_HOSTS: ${MCP_REMOTE_ALLOWED_HOSTS:-}
  UV_CACHE_DIR: /tmp/uv-cache

x-read-only-service: &read-only-service
  read_only: true
  tmpfs:
    - /tmp:size=134217728,mode=1777
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: personal_growth_agent
      POSTGRES_USER: personal_growth_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-personal_growth_agent_dev}
    ports:
      - "${POSTGRES_HOST_IP:-127.0.0.1}:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - personal_growth_agent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personal_growth_agent -d personal_growth_agent"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - db_network

  migrate:
    <<: *read-only-service
    image: personal-growth-agent-backend:local
    build: *backend-build
    environment: *backend-environment
    command: ["python", "-m", "app.db.migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - db_network

  backend:
    <<: *read-only-service
    image: personal-growth-agent-backend:local
    build: *backend-build
    env_file:
      - path: ../backend/.env
        required: false
    environment: *backend-environment
    ports:
      - "${BACKEND_HOST_IP:-127.0.0.1}:${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    networks:
      - app_network
      - db_network

  frontend:
    <<: *read-only-service
    image: personal-growth-agent-frontend:local
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_URL: http://backend:8000
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8000
    ports:
      - "${FRONTEND_HOST_IP:-127.0.0.1}:${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    networks:
      - app_network

volumes:
  personal_growth_agent_postgres_data:

networks:
  app_network: {}
  db_network:
    internal: true

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in infra/.env}

  migrate:
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://personal_growth_agent:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in infra/.env}@postgres:5432/personal_growth_agent
      API_DOCS_ENABLED: "false"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,frontend
      CORS_ALLOWED_ORIGINS: ""
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-12582912}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-120}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
      MCP_STDIO_ALLOWED_COMMANDS: ${MCP_STDIO_ALLOWED_COMMANDS:-uvx}
      MCP_STDIO_ALLOWED_TARGETS: ${MCP_STDIO_ALLOWED_TARGETS:-mcp-server-time}
      MCP_STDIO_ALLOWED_ENV_KEYS: ${MCP_STDIO_ALLOWED_ENV_KEYS:-TZ}
      MCP_STDIO_ALLOW_ABSOLUTE_COMMANDS: "false"
      MCP_STDIO_ALLOW_WORKING_DIRECTORY: "false"
      MCP_REMOTE_ALLOWED_HOSTS: ${MCP_REMOTE_ALLOWED_HOSTS:-}
      UV_CACHE_DIR: /tmp/uv-cache

  backend:
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://personal_growth_agent:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in infra/.env}@postgres:5432/personal_growth_agent
      API_DOCS_ENABLED: "false"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,frontend
      CORS_ALLOWED_ORIGINS: ""
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-12582912}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-120}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
      MCP_STDIO_ALLOWED_COMMANDS: ${MCP_STDIO_ALLOWED_COMMANDS:-uvx}
      MCP_STDIO_ALLOWED_TARGETS: ${MCP_STDIO_ALLOWED_TARGETS:-mcp-server-time}
      MCP_STDIO_ALLOWED_ENV_KEYS: ${MCP_STDIO_ALLOWED_ENV_KEYS:-TZ}
      MCP_STDIO_ALLOW_ABSOLUTE_COMMANDS: "false"
      MCP_STDIO_ALLOW_WORKING_DIRECTORY: "false"
      MCP_REMOTE_ALLOWED_HOSTS: ${MCP_REMOTE_ALLOWED_HOSTS:-}
      UV_CACHE_DIR: /tmp/uv-cache

  caddy:
    image: caddy:2.10-alpine
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?Set PUBLIC_DOMAIN in infra/.env}
      ACCESS_USER: ${ACCESS_USER:?Set ACCESS_USER in infra/.env}
      ACCESS_PASSWORD_HASH: ${ACCESS_PASSWORD_HASH:?Set ACCESS_PASSWORD_HASH in infra/.env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - app_network

volumes:
  caddy_data:
  caddy_config:
